<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Reminder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Word Reminder</h1>

    <button id="allowBtn">Разрешить уведомления</button>
    <button id="wordBtn">Показать слово дня</button>

    <div id="card" class="card">
      <h2 id="word">—</h2>
      <p id="definition">Нажми кнопку, чтобы получить слово.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
